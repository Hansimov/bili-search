services:
  bili-search:
    network_mode: host
    build:
      context: ${BSDK_BUILD_CONTEXT:-..}
      dockerfile: ${BSDK_DOCKERFILE:-docker/Dockerfile}
      additional_contexts:
        sedb_src: ${BSDK_SEDB_CONTEXT:-.}
        tclogger_src: ${BSDK_TCLOGGER_CONTEXT:-.}
        webu_src: ${BSDK_WEBU_CONTEXT:-.}
      args:
        BILI_SEARCH_BASE_IMAGE: ${BSDK_BASE_IMAGE:-bili-search-base:ubuntu24.04-py3}
        PIP_INDEX_URL: ${BSDK_PIP_INDEX_URL:-https://mirrors.ustc.edu.cn/pypi/simple}
        PIP_EXTRA_INDEX_URL: ${BSDK_PIP_EXTRA_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${BSDK_PIP_TRUSTED_HOST:-mirrors.ustc.edu.cn}
        PIP_RETRIES: ${BSDK_PIP_RETRIES:-3}
        PIP_TIMEOUT: ${BSDK_PIP_TIMEOUT:-60}
    image: ${BSDK_IMAGE:-bili-search:p21001}
    container_name: ${BSDK_CONTAINER_NAME:-bili-search-p21001}
    working_dir: /app
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      BSDK_RUNTIME: ${BSDK_RUNTIME:-docker}
      BSDK_SOURCE: ${BSDK_SOURCE:-workspace}
      BILI_SEARCH_APP_HOST: ${BILI_SEARCH_APP_HOST:-0.0.0.0}
      BILI_SEARCH_APP_PORT: ${BILI_SEARCH_APP_PORT:-21001}
      BILI_SEARCH_APP_ELASTIC_INDEX: ${BILI_SEARCH_APP_ELASTIC_INDEX:-bili_videos_dev6}
      BILI_SEARCH_APP_ELASTIC_ENV_NAME: ${BILI_SEARCH_APP_ELASTIC_ENV_NAME:-elastic_dev}
      BILI_SEARCH_APP_LLM_CONFIG: ${BILI_SEARCH_APP_LLM_CONFIG:-deepseek}
      BILI_GOOGLE_HUB_BASE_URL: ${BILI_GOOGLE_HUB_BASE_URL:-http://host.docker.internal:18100}
      BILI_GOOGLE_HUB_TIMEOUT: ${BILI_GOOGLE_HUB_TIMEOUT:-45}
      BILI_LLM_TIMEOUT: ${BILI_LLM_TIMEOUT:-60}
    volumes:
      - ${BSDK_CONFIGS_DIR:-./configs}:/app/configs:ro
      - ${BSDK_LOGS_DIR:-./logs}:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python3", "-m", "service.container_supervisor"]
    restart: unless-stopped